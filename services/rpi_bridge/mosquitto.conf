# MMS V2 Mosquitto Configuration
# Place at: /etc/mosquitto/conf.d/mms.conf

# Security: no anonymous connections
allow_anonymous false
password_file /etc/mosquitto/passwd
acl_file /etc/mosquitto/mms_acl.conf

# Persistence: survive broker restart
persistence true
persistence_location /var/lib/mosquitto/

# Logging
log_dest file /var/log/mosquitto/mosquitto.log
log_type error
log_type warning
log_type notice
log_type information
connection_messages true

# Listener
listener 1883
protocol mqtt

# Keep-alive settings
max_keepalive 120
